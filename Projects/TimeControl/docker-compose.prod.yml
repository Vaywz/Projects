services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: hitexis_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-hitexis_time}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hitexis_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: hitexis_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - hitexis_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hitexis_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hitexis_time}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hitexis_time}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - FRONTEND_URL=${FRONTEND_URL:?Set FRONTEND_URL in .env}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:?Set BACKEND_CORS_ORIGINS in .env}
      - MS_TENANT_ID=${MS_TENANT_ID:-}
      - MS_CLIENT_ID=${MS_CLIENT_ID:-}
      - MS_CLIENT_SECRET=${MS_CLIENT_SECRET:-}
      - MS_FROM_EMAIL=${MS_FROM_EMAIL:-}
      - MS_FROM_NAME=${MS_FROM_NAME:-HitexisTimeControl}
      - DEBUG=${DEBUG:-false}
    ports:
      - "8080:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - hitexis_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hitexis_celery_worker
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hitexis_time}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hitexis_time}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MS_TENANT_ID=${MS_TENANT_ID:-}
      - MS_CLIENT_ID=${MS_CLIENT_ID:-}
      - MS_CLIENT_SECRET=${MS_CLIENT_SECRET:-}
      - MS_FROM_EMAIL=${MS_FROM_EMAIL:-}
      - MS_FROM_NAME=${MS_FROM_NAME:-HitexisTimeControl}
      - FRONTEND_URL=${FRONTEND_URL:?Set FRONTEND_URL in .env}
    networks:
      - hitexis_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hitexis_celery_beat
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hitexis_time}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hitexis_time}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    networks:
      - hitexis_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    container_name: hitexis_frontend
    restart: always
    ports:
      - "4000:80"
    networks:
      - hitexis_network
    depends_on:
      - backend

volumes:
  postgres_data:
    name: hitexis_postgres_data
  redis_data:
    name: hitexis_redis_data

networks:
  hitexis_network:
    name: hitexis_network
    driver: bridge
